<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Management</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: 'SF Mono','Fira Code','Consolas',monospace;
  --bg: #000;
  --panel: #0a0a0a;
  --border: rgba(255,255,255,0.08);
  --border-bright: rgba(255,255,255,0.18);
  --text: #e8e8e8;
  --text-dim: #888;
  --text-faint: #444;
  --accent: #4af;
  --accent2: #f84;
  --accent3: #4f8;
  --accent4: #a4f;
  --red: #f44;
  --green: #4f8;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  padding: 0;
  overflow-x: hidden;
}

/* ── Toolbar ── */
#toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #000;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 42px;
  gap: 8px;
}
#toolbar .title {
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: auto;
}
.tbtn {
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.65rem;
  padding: 4px 10px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: color 0.15s, border-color 0.15s;
}
.tbtn:hover { color: var(--text); border-color: var(--accent); }

/* ── Layout ── */
#content {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto;
  gap: 16px;
  max-width: 1400px;
  margin: 0 auto;
}

/* ── Panel base ── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 18px 20px;
}
.panel-title {
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 14px;
}

/* ── Live Clock ── */
#clock-panel {
  grid-column: 1 / 3;
  text-align: center;
  padding: 24px 20px;
}
#live-clock {
  font-size: 5rem;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
#live-date {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 6px;
  letter-spacing: 0.06em;
}
#live-unix {
  font-size: 0.6rem;
  color: var(--text-faint);
  margin-top: 4px;
}
#live-week {
  font-size: 0.62rem;
  color: var(--text-faint);
  margin-top: 2px;
}

/* ── Day Progress ── */
#day-panel {
  grid-column: 3 / 4;
  grid-row: 1 / 3;
}
.day-setting {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.day-setting label {
  font-size: 0.6rem;
  color: var(--text-dim);
  width: 64px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.day-setting input[type="time"] {
  background: #111;
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.8rem;
  padding: 4px 8px;
  border-radius: 2px;
  outline: none;
  width: 110px;
}
.day-setting input[type="time"]:focus { border-color: var(--accent); }

.day-stat {
  margin-top: 16px;
}
.day-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.day-stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
.day-stat-val { font-size: 1.1rem; color: var(--text); font-variant-numeric: tabular-nums; }
.day-stat-sub { font-size: 0.65rem; color: var(--text-faint); margin-top: 2px; }

.bar-wrap {
  height: 6px;
  background: #1a1a1a;
  border-radius: 3px;
  margin: 8px 0 14px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s linear;
}
.bar-done { background: var(--accent); }
.bar-remain { background: var(--accent2); }

.day-time-block {
  margin-top: 12px;
  height: 28px;
  background: #111;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
}
#day-timeline-done {
  position: absolute;
  left: 0; top: 0; height: 100%;
  background: linear-gradient(90deg, #1a3a5c, var(--accent));
  opacity: 0.6;
  transition: width 1s linear;
}
#day-timeline-now {
  position: absolute;
  top: 0; height: 100%;
  width: 2px;
  background: #fff;
  opacity: 0.9;
  transition: left 1s linear;
}
#day-timeline-label {
  position: absolute;
  right: 6px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.55rem;
  color: rgba(255,255,255,0.3);
}
#day-timeline-left-label {
  position: absolute;
  left: 6px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.55rem;
  color: rgba(255,255,255,0.3);
}

/* ── Stopwatch ── */
#stopwatch-panel { grid-column: 1 / 2; }
#sw-display {
  font-size: 2.8rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
  color: var(--accent3);
  margin: 8px 0;
  letter-spacing: 0.02em;
}
.sw-laps {
  max-height: 120px;
  overflow-y: auto;
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}
.sw-lap {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text-dim);
  padding: 2px 0;
}
.sw-lap.best { color: var(--accent3); }
.sw-lap.worst { color: var(--red); }

/* ── Countdown ── */
#countdown-panel { grid-column: 2 / 3; }
#cd-display {
  font-size: 2.8rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
  color: var(--accent2);
  margin: 8px 0;
  letter-spacing: 0.02em;
  transition: color 0.3s;
}
#cd-display.urgent { color: var(--red); animation: pulse 0.5s ease infinite alternate; }
@keyframes pulse { from { opacity:1; } to { opacity:0.4; } }

.cd-input-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.cd-num {
  background: #111;
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.8rem;
  width: 52px;
  padding: 4px 6px;
  border-radius: 2px;
  outline: none;
  text-align: center;
}
.cd-num:focus { border-color: var(--accent); }
.cd-lbl { font-size: 0.55rem; color: var(--text-faint); text-align: center; display: block; }
.cd-preset-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.cd-preset {
  background: #111;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.6rem;
  padding: 3px 7px;
  border-radius: 2px;
  cursor: pointer;
}
.cd-preset:hover { border-color: var(--accent2); color: var(--text); }

/* ── Pomodoro ── */
#pomodoro-panel { grid-column: 3 / 4; }
#pom-display {
  font-size: 2.8rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
  margin: 8px 0;
  letter-spacing: 0.02em;
}
#pom-display.work { color: var(--red); }
#pom-display.short-break { color: var(--accent3); }
#pom-display.long-break { color: var(--accent); }

.pom-mode-row { display: flex; gap: 6px; margin-bottom: 8px; }
.pom-mode-btn {
  flex: 1;
  background: #111;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.6rem;
  padding: 5px;
  border-radius: 2px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.pom-mode-btn.active { border-color: var(--red); color: var(--red); }
.pom-mode-btn.active.sb { border-color: var(--accent3); color: var(--accent3); }
.pom-mode-btn.active.lb { border-color: var(--accent); color: var(--accent); }

.pom-stats { display: flex; gap: 12px; margin-top: 10px; }
.pom-stat { flex: 1; background: #111; border-radius: 3px; padding: 8px; text-align: center; }
.pom-stat-val { font-size: 1.4rem; color: var(--text); }
.pom-stat-label { font-size: 0.55rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; }

.pom-progress-ring { margin: 4px auto 0; display: block; }

/* ── Multi Timers ── */
#timers-panel { grid-column: 1 / 4; }
.timer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-top: 4px; }
.timer-card {
  background: #0d0d0d;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px;
  position: relative;
}
.timer-card-name {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.timer-card-name input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.65rem;
  outline: none;
  flex: 1;
  padding: 2px 0;
}
.timer-card-name input:focus { border-bottom-color: var(--accent); }
.timer-display {
  font-size: 1.8rem;
  font-variant-numeric: tabular-nums;
  color: var(--accent4);
  margin: 4px 0 8px;
  letter-spacing: 0.02em;
}
.timer-display.done { color: var(--red); animation: pulse 0.5s ease infinite alternate; }
.timer-bar { height: 3px; background: #1a1a1a; border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
.timer-bar-fill { height: 100%; background: var(--accent4); border-radius: 2px; transition: width 1s linear; }
.timer-controls { display: flex; gap: 5px; flex-wrap: wrap; }
.timer-input-row { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }
.timer-num {
  background: #111;
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.7rem;
  width: 44px;
  padding: 3px 5px;
  border-radius: 2px;
  outline: none;
  text-align: center;
}
.timer-num:focus { border-color: var(--accent4); }
.timer-sep { font-size: 0.8rem; color: var(--text-faint); }
.del-btn {
  position: absolute;
  top: 8px; right: 8px;
  background: transparent;
  border: none;
  color: var(--text-faint);
  font-size: 0.7rem;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 2px;
}
.del-btn:hover { color: var(--red); }

/* ── Time Blocks ── */
#timeblocks-panel { grid-column: 1 / 3; }
.tb-input-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
.tb-input {
  background: #111;
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.7rem;
  padding: 4px 8px;
  border-radius: 2px;
  outline: none;
}
.tb-input:focus { border-color: var(--accent); }
.tb-input.label-in { flex: 1; min-width: 120px; }
.tb-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
.tb-block {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #0d0d0d;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 12px;
  position: relative;
}
.tb-block.active { border-color: var(--accent); }
.tb-block.done { opacity: 0.4; }
.tb-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tb-name { font-size: 0.7rem; color: var(--text); flex: 1; }
.tb-times { font-size: 0.6rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.tb-dur { font-size: 0.6rem; color: var(--text-faint); min-width: 48px; text-align: right; }
.tb-status { font-size: 0.55rem; padding: 2px 6px; border-radius: 2px; }
.tb-status.upcoming { background: #1a1a1a; color: var(--text-faint); }
.tb-status.active { background: rgba(68,170,255,0.15); color: var(--accent); }
.tb-status.done { background: rgba(68,255,136,0.1); color: var(--accent3); }
.tb-timeline {
  height: 48px;
  background: #0d0d0d;
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}
.tb-timeline-block {
  position: absolute;
  height: 100%;
  opacity: 0.7;
  border-right: 1px solid rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5rem;
  color: rgba(255,255,255,0.7);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.tb-timeline-now {
  position: absolute;
  top: 0; height: 100%;
  width: 2px;
  background: #fff;
  opacity: 0.8;
  z-index: 10;
}
.tb-timeline-hour {
  position: absolute;
  bottom: 2px;
  font-size: 0.45rem;
  color: rgba(255,255,255,0.2);
  transform: translateX(-50%);
}

/* ── Focus Mode ── */
#focus-panel { grid-column: 3 / 4; }
#focus-task {
  width: 100%;
  background: #111;
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.75rem;
  padding: 8px 10px;
  border-radius: 2px;
  outline: none;
  margin-bottom: 8px;
}
#focus-task:focus { border-color: var(--accent4); }
.focus-session {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #0d0d0d;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 7px 10px;
  margin-bottom: 4px;
  font-size: 0.65rem;
}
.focus-session-done { text-decoration: line-through; color: var(--text-faint); }
.focus-session-time { color: var(--text-faint); font-size: 0.55rem; margin-left: auto; white-space: nowrap; }
.focus-total { font-size: 0.65rem; color: var(--text-dim); margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }

/* ── Shared Buttons ── */
.btn {
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.65rem;
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
.btn:hover { color: var(--text); border-color: var(--accent); }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.primary:hover { background: rgba(68,170,255,0.1); }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(255,68,68,0.1); }
.btn.success { border-color: var(--accent3); color: var(--accent3); }
.btn.success:hover { background: rgba(68,255,136,0.1); }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

/* ── Circular progress ── */
.ring-track { fill: none; stroke: #1a1a1a; }
.ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

/* ── Color swatches ── */
input[type="color"] {
  width: 28px; height: 26px;
  border: 1px solid var(--border-bright);
  border-radius: 2px;
  background: #111;
  cursor: pointer;
  padding: 0;
}

@media (max-width: 900px) {
  #content { grid-template-columns: 1fr 1fr; }
  #clock-panel { grid-column: 1 / 3; }
  #day-panel { grid-column: 1 / 3; grid-row: auto; }
  #timers-panel { grid-column: 1 / 3; }
  #timeblocks-panel { grid-column: 1 / 3; }
  #focus-panel { grid-column: 1 / 3; }
}
@media (max-width: 580px) {
  #content { grid-template-columns: 1fr; }
  #clock-panel, #day-panel, #stopwatch-panel, #countdown-panel, #pomodoro-panel,
  #timers-panel, #timeblocks-panel, #focus-panel { grid-column: 1; }
  #live-clock { font-size: 3rem; }
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="title">⏱ Time Management</span>
  <button class="tbtn" onclick="window.open('index.html','_self')">← Dashboard</button>
  <button class="tbtn" id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
</div>

<div id="content">

  <!-- ── Live Clock ── -->
  <div class="panel" id="clock-panel">
    <div class="panel-title">Live Clock</div>
    <div id="live-clock">00:00:00</div>
    <div id="live-date"></div>
    <div id="live-unix"></div>
    <div id="live-week"></div>
  </div>

  <!-- ── Day Progress (right column, tall) ── -->
  <div class="panel" id="day-panel">
    <div class="panel-title">Day Progress</div>
    <div class="day-setting">
      <label>Wake</label>
      <input type="time" id="wake-time" value="07:00">
    </div>
    <div class="day-setting">
      <label>Sleep</label>
      <input type="time" id="sleep-time" value="23:00">
    </div>
    <div class="day-stat" id="day-stats">
      <div class="day-stat-row">
        <span class="day-stat-label">Day complete</span>
        <span class="day-stat-val" id="pct-done">—</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill bar-done" id="bar-done" style="width:0%"></div></div>
      <div class="day-stat-sub" id="time-elapsed">—</div>

      <div class="day-stat-row" style="margin-top:12px">
        <span class="day-stat-label">Day remains</span>
        <span class="day-stat-val" id="pct-left">—</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill bar-remain" id="bar-remain" style="width:0%"></div></div>
      <div class="day-stat-sub" id="time-remaining">—</div>
    </div>

    <div class="day-time-block" style="margin-top:14px">
      <div id="day-timeline-done"></div>
      <div id="day-timeline-now"></div>
      <div id="day-timeline-left-label"></div>
      <div id="day-timeline-label"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:0.55rem;color:var(--text-faint);margin-top:3px">
      <span id="tl-wake-lbl"></span>
      <span id="tl-sleep-lbl"></span>
    </div>

    <!-- Productivity score -->
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">
      <div class="day-stat-row">
        <span class="day-stat-label">Clock time</span>
        <span style="font-size:0.65rem;color:var(--text-dim)" id="clock-12h">—</span>
      </div>
      <div class="day-stat-row" style="margin-top:6px">
        <span class="day-stat-label">Day length</span>
        <span style="font-size:0.65rem;color:var(--text-dim)" id="day-length">—</span>
      </div>
      <div class="day-stat-row" style="margin-top:6px">
        <span class="day-stat-label">Midpoint</span>
        <span style="font-size:0.65rem;color:var(--text-dim)" id="day-midpoint">—</span>
      </div>
    </div>
  </div>

  <!-- ── Stopwatch ── -->
  <div class="panel" id="stopwatch-panel">
    <div class="panel-title">Stopwatch</div>
    <div id="sw-display">00:00.000</div>
    <div class="btn-row">
      <button class="btn primary" id="sw-start-btn" onclick="swToggle()">Start</button>
      <button class="btn" onclick="swLap()">Lap</button>
      <button class="btn danger" onclick="swReset()">Reset</button>
    </div>
    <div class="sw-laps" id="sw-laps"></div>
  </div>

  <!-- ── Countdown ── -->
  <div class="panel" id="countdown-panel">
    <div class="panel-title">Countdown Timer</div>
    <div id="cd-display">00:00:00</div>
    <div class="cd-preset-row">
      <button class="cd-preset" onclick="cdPreset(1*60)">1m</button>
      <button class="cd-preset" onclick="cdPreset(5*60)">5m</button>
      <button class="cd-preset" onclick="cdPreset(10*60)">10m</button>
      <button class="cd-preset" onclick="cdPreset(15*60)">15m</button>
      <button class="cd-preset" onclick="cdPreset(25*60)">25m</button>
      <button class="cd-preset" onclick="cdPreset(30*60)">30m</button>
      <button class="cd-preset" onclick="cdPreset(45*60)">45m</button>
      <button class="cd-preset" onclick="cdPreset(60*60)">1h</button>
      <button class="cd-preset" onclick="cdPreset(90*60)">1.5h</button>
      <button class="cd-preset" onclick="cdPreset(120*60)">2h</button>
    </div>
    <div class="cd-input-row">
      <div>

<script>
// ── Utilities ──
function pad(n,d=2){ return String(n).padStart(d,'0'); }
function fmtMs(ms){
  const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000),
        s=Math.floor((ms%60000)/1000), ms2=ms%1000;
  if(h>0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}.${pad(ms2,3)}`;
}
function fmtSec(s){
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  return `${pad(h)}:${pad(m)}:${pad(ss)}`;
}
function hhmm(h,m){ return `${pad(h)}:${pad(m)}`; }
function timeToMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function minToHHMM(m){ return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
function fmt12(h,m){
  const ampm=h<12?'AM':'PM'; h=h%12||12;
  return `${h}:${pad(m)} ${ampm}`;
}

// ── Notifications ──
const notifSupported=typeof Notification!=='undefined';
function notify(title,body){
  try{
    if(notifSupported&&Notification.permission==='granted'){
      new Notification(title,{body,icon:'icon.jpg'});
    }
  }catch(e){}
}
try{
  if(notifSupported&&Notification.permission==='default') Notification.requestPermission();
}catch(e){}

// ══════════════════════════════════════
// LIVE CLOCK
// ══════════════════════════════════════
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function updateClock(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  document.getElementById('live-clock').textContent=`${pad(h)}:${pad(m)}:${pad(s)}`;
  const doy=Math.ceil((now-(new Date(now.getFullYear(),0,1)))/86400000);
  const wn=Math.ceil((doy+new Date(now.getFullYear(),0,1).getDay())/7);
  document.getElementById('live-date').textContent=
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('live-unix').textContent=`Unix: ${Math.floor(now.getTime()/1000)}`;
  document.getElementById('live-week').textContent=`Week ${wn} of ${now.getFullYear()} · Day ${doy} of 365`;
  document.getElementById('clock-12h').textContent=fmt12(h,m);
  updateDayProgress(now);
}
setInterval(updateClock,1000);
updateClock();

// ══════════════════════════════════════
// DAY PROGRESS
// ══════════════════════════════════════
function updateDayProgress(now){
  const wakeStr=document.getElementById('wake-time').value||'07:00';
  const sleepStr=document.getElementById('sleep-time').value||'23:00';
  const wakeMin=timeToMin(wakeStr);
  let sleepMin=timeToMin(sleepStr);
  // Overnight support: if sleep is before or equal to wake, add 24h
  const overnight=sleepMin<=wakeMin;
  if(overnight) sleepMin+=24*60;
  const dayLen=sleepMin-wakeMin;
  if(dayLen<=0) return;

  // nowMin: minutes since midnight; if overnight and we're in the early hours (before wake),
  // add 24h so it falls in the right position after midnight
  let nowMin=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  if(overnight && nowMin<wakeMin) nowMin+=24*60;

  const elapsed=Math.max(0,Math.min(dayLen,nowMin-wakeMin));
  const remain=Math.max(0,dayLen-elapsed);
  const pctDone=elapsed/dayLen;
  const pctLeft=remain/dayLen;

  document.getElementById('pct-done').textContent=`${(pctDone*100).toFixed(1)}%`;
  document.getElementById('pct-left').textContent=`${(pctLeft*100).toFixed(1)}%`;
  document.getElementById('bar-done').style.width=`${pctDone*100}%`;
  document.getElementById('bar-remain').style.width=`${pctLeft*100}%`;

  const elH=Math.floor(elapsed/60), elM=Math.round(elapsed%60);
  const remH=Math.floor(remain/60), remM=Math.round(remain%60);
  document.getElementById('time-elapsed').textContent=`${elH}h ${elM}m elapsed`;
  document.getElementById('time-remaining').textContent=`${remH}h ${remM}m remaining`;
  const dayLenH=Math.floor(dayLen/60), dayLenM=dayLen%60;
  document.getElementById('day-length').textContent=
    `${dayLenH}h ${dayLenM}m${overnight?' (+1 day)':''}`;
  const midRaw=(wakeMin+dayLen/2)%(24*60);
  document.getElementById('day-midpoint').textContent=minToHHMM(Math.round(midRaw));
  document.getElementById('tl-wake-lbl').textContent=wakeStr;
  document.getElementById('tl-sleep-lbl').textContent=sleepStr+(overnight?' +1d':'');
  document.getElementById('day-timeline-label').textContent=sleepStr+(overnight?' +1d':'');
  document.getElementById('day-timeline-left-label').textContent=wakeStr;

  const donePct=Math.min(100,pctDone*100);
  document.getElementById('day-timeline-done').style.width=donePct+'%';
  document.getElementById('day-timeline-now').style.left=`calc(${donePct}% - 1px)`;
}
document.getElementById('wake-time').addEventListener('change',()=>updateClock());
document.getElementById('sleep-time').addEventListener('change',()=>updateClock());

// Load saved wake/sleep
(()=>{
  const w=localStorage.getItem('tm_wake'), s=localStorage.getItem('tm_sleep');
  if(w) document.getElementById('wake-time').value=w;
  if(s) document.getElementById('sleep-time').value=s;
})();
document.getElementById('wake-time').addEventListener('change',e=>localStorage.setItem('tm_wake',e.target.value));
document.getElementById('sleep-time').addEventListener('change',e=>localStorage.setItem('tm_sleep',e.target.value));

// ══════════════════════════════════════
// STOPWATCH
// ══════════════════════════════════════
let swRunning=false, swStart=0, swElapsed=0, swInterval=null, swLaps=[], swLapStart=0;

function swSave(){
  localStorage.setItem('tm_sw', JSON.stringify({
    running: swRunning,
    elapsed: swRunning ? Date.now()-swStart : swElapsed,
    startedAt: swRunning ? swStart : null,
    lapStart: swLapStart,
    laps: swLaps
  }));
}
function swLoad(){
  try{
    const d=JSON.parse(localStorage.getItem('tm_sw'));
    if(!d) return;
    swLaps=d.laps||[];
    swLapStart=d.lapStart||0;
    if(d.running && d.startedAt){
      // Was running — pick up where it left off
      swElapsed=Date.now()-d.startedAt;
      swStart=d.startedAt;
      swRunning=true;
      swInterval=setInterval(swTick,33);
      document.getElementById('sw-start-btn').textContent='Pause';
      document.getElementById('sw-start-btn').className='btn danger';
    } else {
      swElapsed=d.elapsed||0;
      document.getElementById('sw-start-btn').textContent=swElapsed>0?'Resume':'Start';
      document.getElementById('sw-start-btn').className=swElapsed>0?'btn success':'btn primary';
    }
    document.getElementById('sw-display').textContent=fmtMs(swElapsed);
    renderLaps();
  }catch(e){}
}

function swToggle(){
  if(!swRunning){
    swStart=Date.now()-swElapsed;
    if(swLapStart===0) swLapStart=Date.now();
    swInterval=setInterval(swTick,33);
    swRunning=true;
    document.getElementById('sw-start-btn').textContent='Pause';
    document.getElementById('sw-start-btn').className='btn danger';
  } else {
    clearInterval(swInterval);
    swElapsed=Date.now()-swStart;
    swRunning=false;
    document.getElementById('sw-start-btn').textContent='Resume';
    document.getElementById('sw-start-btn').className='btn success';
  }
  swSave();
}
function swTick(){
  swElapsed=Date.now()-swStart;
  document.getElementById('sw-display').textContent=fmtMs(swElapsed);
  swSave();
}
function swLap(){
  if(!swRunning && swElapsed===0) return;
  const lapMs=Date.now()-swLapStart;
  swLapStart=Date.now();
  swLaps.push(lapMs);
  swSave();
  renderLaps();
}
function swReset(){
  clearInterval(swInterval);
  swRunning=false; swElapsed=0; swStart=0; swLapStart=0; swLaps=[];
  localStorage.removeItem('tm_sw');
  document.getElementById('sw-display').textContent='00:00.000';
  document.getElementById('sw-start-btn').textContent='Start';
  document.getElementById('sw-start-btn').className='btn primary';
  renderLaps();
}
function renderLaps(){
  const el=document.getElementById('sw-laps');
  if(!swLaps.length){ el.innerHTML=''; return; }
  const best=Math.min(...swLaps), worst=Math.max(...swLaps);
  el.innerHTML=swLaps.map((l,i)=>{
    const cls=swLaps.length>1?(l===best?'best':l===worst?'worst':''):'';
    return `<div class="sw-lap ${cls}"><span>Lap ${i+1}</span><span>${fmtMs(l)}</span></div>`;
  }).reverse().join('');
}
swLoad();

// ══════════════════════════════════════
// COUNTDOWN
// ══════════════════════════════════════
let cdRunning=false, cdTotal=300, cdLeft=300, cdInterval=null;

function cdSet(){
  const h=parseInt(document.getElementById('cd-h').value)||0;
  const m=parseInt(document.getElementById('cd-m').value)||0;
  const s=parseInt(document.getElementById('cd-s').value)||0;
  cdTotal=h*3600+m*60+s;
  cdLeft=cdTotal;
  cdReset();
}
function cdPreset(s){ cdTotal=s; cdLeft=s; cdReset(); }
function cdToggle(){
  if(!cdRunning){
    if(cdLeft<=0){ cdLeft=cdTotal; }
    cdInterval=setInterval(cdTick,1000);
    cdRunning=true;
    document.getElementById('cd-start-btn').textContent='Pause';
    document.getElementById('cd-start-btn').className='btn danger';
  } else {
    clearInterval(cdInterval);
    cdRunning=false;
    document.getElementById('cd-start-btn').textContent='Resume';
    document.getElementById('cd-start-btn').className='btn success';
  }
}
function cdTick(){
  cdLeft--;
  if(cdLeft<=0){ cdLeft=0; clearInterval(cdInterval); cdRunning=false;
    document.getElementById('cd-display').classList.add('urgent');
    document.getElementById('cd-start-btn').textContent='Start';
    document.getElementById('cd-start-btn').className='btn primary';
    notify('Timer Done!','Your countdown has finished.');
  }
  renderCd();
}
function cdReset(){
  clearInterval(cdInterval); cdRunning=false; cdLeft=cdTotal;
  document.getElementById('cd-display').classList.remove('urgent');
  document.getElementById('cd-start-btn').textContent='Start';
  document.getElementById('cd-start-btn').className='btn primary';
  renderCd();
}
function renderCd(){
  document.getElementById('cd-display').textContent=fmtSec(cdLeft);
}
renderCd();

// ══════════════════════════════════════
// POMODORO
// ══════════════════════════════════════
const POM_DURATIONS={work:25*60,'short-break':5*60,'long-break':15*60};
let pomMode_='work', pomLeft=25*60, pomTotal=25*60, pomRunning=false;
let pomInterval=null, pomSessions=0, pomFocusMin=0, pomStreak=0;
const RING_CIRC=263.9;

function pomMode(mode){
  pomMode_=mode;
  pomTotal=POM_DURATIONS[mode];
  pomLeft=pomTotal;
  pomReset();
  ['work','short-break','long-break'].forEach(m=>{
    const id=`pom-${m==='work'?'work':m==='short-break'?'sb':'lb'}-btn`;
    document.getElementById(id).classList.remove('active');
  });
  const activeId=mode==='work'?'pom-work-btn':mode==='short-break'?'pom-sb-btn':'pom-lb-btn';
  document.getElementById(activeId).classList.add('active');
  const display=document.getElementById('pom-display');
  display.className=mode;
  const ring=document.getElementById('pom-ring');
  ring.style.stroke=mode==='work'?'#f44':mode==='short-break'?'#4f8':'#4af';
}
function pomToggle(){
  if(!pomRunning){
    pomInterval=setInterval(pomTick,1000);
    pomRunning=true;
    document.getElementById('pom-start-btn').textContent='Pause';
    document.getElementById('pom-start-btn').className='btn';
  } else {
    clearInterval(pomInterval); pomRunning=false;
    document.getElementById('pom-start-btn').textContent='Resume';
    document.getElementById('pom-start-btn').className='btn primary';
  }
}
function pomTick(){
  pomLeft--;
  if(pomLeft<=0){
    pomLeft=0; clearInterval(pomInterval); pomRunning=false;
    if(pomMode_==='work'){ pomSessions++; pomFocusMin+=pomTotal/60; pomStreak++; }
    else { pomStreak=0; }
    document.getElementById('pom-start-btn').textContent='Start';
    document.getElementById('pom-start-btn').className='btn danger';
    notify('Pomodoro',pomMode_==='work'?'Work session complete! Take a break.':'Break over! Time to focus.');
    updatePomStats();
    // auto advance
    if(pomMode_==='work') pomMode(pomSessions%4===0?'long-break':'short-break');
    else pomMode('work');
  }
  renderPom();
}
function pomReset(){
  clearInterval(pomInterval); pomRunning=false;
  pomLeft=pomTotal;
  document.getElementById('pom-start-btn').textContent='Start';
  document.getElementById('pom-start-btn').className='btn danger';
  renderPom();
}
function pomSkip(){
  clearInterval(pomInterval); pomRunning=false;
  pomLeft=0; pomTick();
}
function renderPom(){
  document.getElementById('pom-display').textContent=fmtSec(pomLeft);
  const frac=pomLeft/pomTotal;
  document.getElementById('pom-ring').style.strokeDashoffset=RING_CIRC*(1-frac);
}
function updatePomStats(){
  document.getElementById('pom-sessions').textContent=pomSessions;
  document.getElementById('pom-focus-time').textContent=pomFocusMin>=60?
    `${Math.floor(pomFocusMin/60)}h${Math.round(pomFocusMin%60)}m`:
    `${Math.round(pomFocusMin)}m`;
  document.getElementById('pom-streak').textContent=pomStreak;
}
renderPom();

// ══════════════════════════════════════
// CUSTOM TIMERS
// ══════════════════════════════════════
let timers={}, timerIdCounter=0;

function saveTimers(){
  const data=Object.values(timers).map(t=>({
    id:t.id, name:t.name, total:t.total,
    left:t.running ? Math.max(0, t.left - Math.floor((Date.now()-(t.startedAt||Date.now()))/1000)) : t.left,
    running:t.running,
    startedAt:t.running?(t.startedAt||Date.now()):null
  }));
  localStorage.setItem('tm_timers', JSON.stringify({data, counter:timerIdCounter}));
}
function loadTimers(){
  try{
    const saved=JSON.parse(localStorage.getItem('tm_timers'));
    if(!saved||!saved.data||!saved.data.length) return false;
    timerIdCounter=saved.counter||0;
    saved.data.forEach(t=>{
      let left=t.left;
      let startedAt=null;
      if(t.running && t.startedAt){
        const elapsed=Math.floor((Date.now()-t.startedAt)/1000);
        left=Math.max(0,t.left-elapsed);
        startedAt=t.startedAt;
      }
      timers[t.id]={id:t.id,name:t.name,total:t.total,left,running:false,interval:null,startedAt};
      if(t.running && left>0){
        // Resume running
        timers[t.id].startedAt=Date.now()-(( t.total-left)*1000);
        timers[t.id].running=true;
        timers[t.id].interval=setInterval(()=>timerTick(t.id),1000);
      }
    });
    return true;
  }catch(e){ return false; }
}

function addTimer(name='Timer',h=0,m=5,s=0){
  const id=++timerIdCounter;
  const total=h*3600+m*60+s;
  timers[id]={id,name,total,left:total,running:false,interval:null,startedAt:null};
  saveTimers();
  renderTimers();
}
function deleteTimer(id){
  clearInterval(timers[id].interval);
  delete timers[id];
  saveTimers();
  renderTimers();
}
function timerToggle(id){
  const t=timers[id];
  if(!t) return;
  if(!t.running){
    if(t.left<=0) t.left=t.total;
    t.startedAt=Date.now()-(( t.total-t.left)*1000);
    t.interval=setInterval(()=>timerTick(id),1000);
    t.running=true;
  } else {
    clearInterval(t.interval); t.running=false; t.startedAt=null;
  }
  saveTimers();
  renderTimers();
}
function timerTick(id){
  const t=timers[id]; if(!t) return;
  t.left--;
  if(t.left<=0){
    t.left=0; clearInterval(t.interval); t.running=false; t.startedAt=null;
    notify(`Timer: ${t.name}`,'Done!');
  }
  saveTimers();
  updateTimerCard(id);
}
function timerReset(id){
  const t=timers[id]; if(!t) return;
  clearInterval(t.interval); t.running=false; t.left=t.total; t.startedAt=null;
  saveTimers();
  updateTimerCard(id);
}
function timerSetFromInputs(id){
  const h=parseInt(document.getElementById(`th-${id}`).value)||0;
  const m=parseInt(document.getElementById(`tm-${id}`).value)||0;
  const s=parseInt(document.getElementById(`ts-${id}`).value)||0;
  const t=timers[id]; if(!t) return;
  clearInterval(t.interval); t.running=false; t.startedAt=null;
  t.total=h*3600+m*60+s; t.left=t.total;
  saveTimers();
  updateTimerCard(id);
}
function updateTimerCard(id){
  const t=timers[id]; if(!t) return;
  const disp=document.getElementById(`td-${id}`);
  const bar=document.getElementById(`tb-${id}`);
  const btn=document.getElementById(`tsbtn-${id}`);
  if(!disp) return;
  disp.textContent=fmtSec(t.left);
  disp.className='timer-display'+(t.left===0&&!t.running?' done':'');
  const pct=t.total>0?(t.left/t.total)*100:0;
  if(bar) bar.style.width=`${100-pct}%`;
  if(btn){ btn.textContent=t.running?'Pause':'Start'; btn.className=t.running?'btn danger':'btn primary'; }
}
function renderTimers(){
  const grid=document.getElementById('timer-grid');
  grid.innerHTML=Object.values(timers).map(t=>`
    <div class="timer-card" id="tc-${t.id}">
      <button class="del-btn" onclick="deleteTimer(${t.id})">✕</button>
      <div class="timer-card-name">
        <input id="tn-${t.id}" value="${t.name}" onblur="timers[${t.id}].name=this.value;saveTimers();" placeholder="Name">
      </div>
      <div class="timer-input-row">
        <input class="timer-num" id="th-${t.id}" type="number" min="0" max="99" value="${Math.floor(t.total/3600)}" placeholder="0">
        <span class="timer-sep">:</span>
        <input class="timer-num" id="tm-${t.id}" type="number" min="0" max="59" value="${Math.floor((t.total%3600)/60)}" placeholder="0">
        <span class="timer-sep">:</span>
        <input class="timer-num" id="ts-${t.id}" type="number" min="0" max="59" value="${t.total%60}" placeholder="0">
        <button class="btn" onclick="timerSetFromInputs(${t.id})" style="font-size:0.6rem;padding:3px 8px">Set</button>
      </div>
      <div class="timer-display ${t.running?'':''}${t.left===0&&!t.running?' done':''}" id="td-${t.id}">${fmtSec(t.left)}</div>
      <div class="timer-bar"><div class="timer-bar-fill" id="tb-${t.id}" style="width:${t.total>0?((1-t.left/t.total)*100):0}%"></div></div>
      <div class="timer-controls">
        <button class="${t.running?'btn danger':'btn primary'}" id="tsbtn-${t.id}" onclick="timerToggle(${t.id})">${t.running?'Pause':'Start'}</button>
        <button class="btn" onclick="timerReset(${t.id})">Reset</button>
      </div>
    </div>
  `).join('');
}
// Load saved timers, or seed with defaults
if(!loadTimers()){
  addTimer('Coffee Break',0,5,0);
  addTimer('Deep Work',0,25,0);
} else {
  renderTimers();
}

// ══════════════════════════════════════
// TIME BLOCKS
// ══════════════════════════════════════
let timeBlocks=[];
const TB_COLORS=['#4aaff4','#f48444','#4af884','#a44af4','#f4444a','#f4d44a','#4af4f4'];
let tbColorIdx=0;

function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtDateLabel(s){
  if(!s) return '';
  const [y,m,d]=s.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const today=todayStr();
  const tom=new Date(); tom.setDate(tom.getDate()+1);
  const tomStr=`${tom.getFullYear()}-${pad(tom.getMonth()+1)}-${pad(tom.getDate())}`;
  if(s===today) return 'Today';
  if(s===tomStr) return 'Tomorrow';
  return dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

let tbViewDate=todayStr();

function tbSetDate(){
  const v=document.getElementById('tb-view-date').value;
  if(v){ tbViewDate=v; renderTimeBlocks(); }
}
function tbGoToday(){
  tbViewDate=todayStr();
  document.getElementById('tb-view-date').value=tbViewDate;
  renderTimeBlocks();
}

// Init date inputs to today
(()=>{
  const t=todayStr();
  document.getElementById('tb-date').value=t;
  document.getElementById('tb-view-date').value=t;
})();

function loadTimeBlocks(){
  try{ timeBlocks=JSON.parse(localStorage.getItem('tm_blocks'))||[]; }catch(e){ timeBlocks=[]; }
}
function saveTimeBlocks(){ localStorage.setItem('tm_blocks',JSON.stringify(timeBlocks)); }
loadTimeBlocks();

function addTimeBlock(){
  const name=document.getElementById('tb-name').value.trim()||'Block';
  const date=document.getElementById('tb-date').value||todayStr();
  const start=document.getElementById('tb-start').value||'09:00';
  const end=document.getElementById('tb-end').value||'10:00';
  const color=document.getElementById('tb-color').value;
  if(timeToMin(end)<=timeToMin(start)){ alert('End must be after start'); return; }
  timeBlocks.push({id:Date.now(),name,date,start,end,color});
  timeBlocks.sort((a,b)=>a.date===b.date?timeToMin(a.start)-timeToMin(b.start):a.date.localeCompare(b.date));
  document.getElementById('tb-name').value='';
  // Switch view to the added block's date
  tbViewDate=date;
  document.getElementById('tb-view-date').value=date;
  saveTimeBlocks();
  renderTimeBlocks();
}
function deleteTimeBlock(id){
  timeBlocks=timeBlocks.filter(b=>b.id!==id);
  saveTimeBlocks();
  renderTimeBlocks();
}
function renderTimeBlocks(){
  const now=new Date();
  const today=todayStr();
  const isToday=tbViewDate===today;
  const nowMin=now.getHours()*60+now.getMinutes();

  // Filter to viewed date
  const visible=timeBlocks.filter(b=>(b.date||today)===tbViewDate);

  // Label
  document.getElementById('tb-viewing-label').textContent=
    `Viewing: ${fmtDateLabel(tbViewDate)}` + (visible.length?` · ${visible.length} block${visible.length===1?'':'s'}`:'');

  // Determine timeline range
  const wakeMin=timeToMin(document.getElementById('wake-time').value||'07:00');
  const sleepMin=timeToMin(document.getElementById('sleep-time').value||'23:00');
  const rangeStart=Math.min(wakeMin, visible.length?timeToMin(visible[0].start):wakeMin);
  const rangeEnd=Math.max(sleepMin, visible.length?timeToMin(visible[visible.length-1].end):sleepMin);
  const rangeLen=rangeEnd-rangeStart||1;

  // Timeline
  const timeline=document.getElementById('tb-timeline');
  Array.from(timeline.children).forEach(c=>{ if(c.id!=='tb-now-line') c.remove(); });

  // Hour markers
  for(let hm=Math.ceil(rangeStart/60)*60; hm<rangeEnd; hm+=60){
    const pct=(hm-rangeStart)/rangeLen*100;
    const lbl=document.createElement('div');
    lbl.className='tb-timeline-hour';
    lbl.style.left=pct+'%';
    lbl.textContent=pad(Math.floor(hm/60))+':00';
    timeline.appendChild(lbl);
  }

  // Blocks
  visible.forEach(b=>{
    const bs=timeToMin(b.start), be=timeToMin(b.end);
    const left=(bs-rangeStart)/rangeLen*100;
    const width=(be-bs)/rangeLen*100;
    const el=document.createElement('div');
    el.className='tb-timeline-block';
    el.style.left=left+'%';
    el.style.width=width+'%';
    el.style.background=b.color;
    el.style.opacity='0.5';
    el.title=`${b.name} ${b.start}–${b.end}`;
    el.textContent=b.name;
    timeline.appendChild(el);
  });

  // Now line — only show if viewing today
  const nowLine=document.getElementById('tb-now-line');
  if(isToday){
    const nowPct=Math.min(100,Math.max(0,(nowMin-rangeStart)/rangeLen*100));
    nowLine.style.left=`calc(${nowPct}% - 1px)`;
    nowLine.style.display='block';
  } else {
    nowLine.style.display='none';
  }

  // List
  const list=document.getElementById('tb-list');
  if(!visible.length){ list.innerHTML='<div style="font-size:0.65rem;color:var(--text-faint);padding:8px 0">No blocks for this date.</div>'; return; }
  list.innerHTML=visible.map(b=>{
    const bs=timeToMin(b.start), be=timeToMin(b.end);
    const active=isToday&&nowMin>=bs&&nowMin<be;
    const done=isToday&&nowMin>=be;
    const dur=be-bs;
    const h=Math.floor(dur/60), m=dur%60;
    let status='upcoming', statusLabel='Upcoming';
    if(active){ status='active'; statusLabel='Active'; }
    if(done){ status='done'; statusLabel='Done'; }
    return `<div class="tb-block ${active?'active':done?'done':''}">
      <div class="tb-color-dot" style="background:${b.color}"></div>
      <div class="tb-name">${b.name}</div>
      <div class="tb-times">${b.start} – ${b.end}</div>
      <div class="tb-dur">${h>0?h+'h ':''}${m>0?m+'m':''}</div>
      <span class="tb-status ${status}">${statusLabel}</span>
      <button class="del-btn" style="position:static;margin-left:4px" onclick="deleteTimeBlock(${b.id})">✕</button>
    </div>`;
  }).join('');
}
setInterval(renderTimeBlocks, 30000);
renderTimeBlocks();
document.getElementById('wake-time').addEventListener('change', renderTimeBlocks);
document.getElementById('sleep-time').addEventListener('change', renderTimeBlocks);

// ══════════════════════════════════════
// FOCUS LOG
// ══════════════════════════════════════
let focusActive=false, focusStart=null, focusSessions=[];
try{ focusSessions=JSON.parse(localStorage.getItem('tm_focus'))||[]; }catch(e){ focusSessions=[]; }

function focusToggle(){
  const btn=document.getElementById('focus-start-btn');
  if(!focusActive){
    focusStart=Date.now();
    focusActive=true;
    btn.textContent='Stop Session';
    btn.className='btn danger';
  } else {
    const task=document.getElementById('focus-task').value.trim()||'Untitled';
    const dur=Math.round((Date.now()-focusStart)/60000);
    const now=new Date();
    focusSessions.unshift({task,dur,time:now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})});
    focusSessions=focusSessions.slice(0,50);
    localStorage.setItem('tm_focus',JSON.stringify(focusSessions));
    focusActive=false;
    btn.textContent='Start Session';
    btn.className='btn primary';
    renderFocus();
  }
}
function focusClear(){
  focusSessions=[]; localStorage.removeItem('tm_focus'); renderFocus();
}
function renderFocus(){
  const el=document.getElementById('focus-sessions');
  if(!focusSessions.length){ el.innerHTML='<div style="font-size:0.65rem;color:var(--text-faint)">No sessions yet.</div>'; return; }
  el.innerHTML=focusSessions.map((s,i)=>`
    <div class="focus-session">
      <span style="color:var(--text-dim);flex:1">${s.task}</span>
      <span style="color:var(--accent4);margin:0 8px;font-size:0.65rem">${s.dur}m</span>
      <span class="focus-session-time">${s.time}</span>
    </div>
  `).join('');
  const total=focusSessions.reduce((a,s)=>a+s.dur,0);
  const h=Math.floor(total/60), m=total%60;
  document.getElementById('focus-total').textContent=
    `Total: ${h>0?h+'h ':''}${m}m across ${focusSessions.length} session${focusSessions.length===1?'':'s'}`;
}
renderFocus();

// ══════════════════════════════════════

function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
